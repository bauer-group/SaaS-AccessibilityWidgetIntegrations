<!doctype html>
<!--
  Source for assets/og-image.png. Rendered at 1200×630 and screenshotted:
  open /assets/og-image.html in a 1200×630 viewport and capture #card.
  Kept in the repo so the social preview can be regenerated deterministically.
-->
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      #card {
        width: 1200px;
        height: 630px;
        padding: 76px 80px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        color: #eef2fb;
        background:
          radial-gradient(900px 500px at 88% -10%, rgba(0, 88, 163, 0.55), transparent 60%),
          linear-gradient(135deg, #0b1020 0%, #0c1830 100%);
      }
      .top {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .logo {
        width: 64px;
        height: 64px;
      }
      .brand {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .brand em {
        font-style: normal;
        color: #9fb4e6;
        display: block;
        font-size: 17px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-top: 2px;
      }
      h1 {
        font-size: 82px;
        line-height: 1.02;
        letter-spacing: -0.03em;
        font-weight: 800;
      }
      h1 span {
        color: #4d9be0;
      }
      .sub {
        font-size: 30px;
        color: #c4cfe8;
        margin-top: 22px;
        max-width: 30ch;
      }
      .bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .standards {
        font-size: 22px;
        font-weight: 700;
        color: #2bd576;
        letter-spacing: 0.01em;
      }
      .tiles {
        display: flex;
        gap: 12px;
      }
      .tile {
        width: 60px;
        height: 60px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 22px;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div class="top">
        <svg class="logo" viewBox="-4 -4 32 32" aria-hidden="true">
          <rect x="-4" y="-4" width="32" height="32" rx="7" fill="#0058a3" />
          <g
            fill="none"
            stroke="#fff"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="16" cy="4" r="1" />
            <path d="m18 19 1-7-6 1" />
            <path d="m5 8 3-3 5.5 3-2.36 3.5" />
            <path d="M4.24 14.5a5 5 0 0 0 6.88 6" />
            <path d="M13.76 17.5a5 5 0 0 0-6.88-6" />
          </g>
        </svg>
        <div class="brand">BAUER GROUP<em>Accessibility Widget</em></div>
      </div>

      <div>
        <h1>Integrations<span>.</span></h1>
        <p class="sub">13 framework, CMS &amp; shop plugins — one CDN-hosted widget.</p>
      </div>

      <div class="bottom">
        <div class="standards">BFSG · EN 301 549 · WCAG 2.2 AA</div>
        <div class="tiles">
          <span class="tile" style="background: #61dafb; color: #0b1020">Re</span>
          <span class="tile" style="background: #42b883; color: #0b1020">Vue</span>
          <span class="tile" style="background: #dd0031; color: #fff">Ng</span>
          <span class="tile" style="background: #21759b; color: #fff">WP</span>
          <span class="tile" style="background: #ff8700; color: #0b1020">T3</span>
          <span class="tile" style="background: #95bf47; color: #0b1020">Sh</span>
        </div>
      </div>
    </div>
  </body>
</html>
