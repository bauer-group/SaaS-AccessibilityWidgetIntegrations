# =============================================================================
# CLA Assistant
# =============================================================================
# Because the project is dual-licensed (GNU AGPL-3.0 OR commercial), every
# contributor must agree to the Contributor License Agreement (CLA.md) so the
# relicensing grant covers the commercial offering. This workflow posts a CLA
# prompt on each PR and records signatures in signatures/version1/cla.json;
# contributors sign by commenting the exact phrase below on their PR.
#
# Required repository secret:
#   CLA_SIGNATURES_TOKEN — a Personal Access Token (classic, `repo` scope, or
#   fine-grained with Contents: read/write on this repo). Needed so the action
#   can commit the signatures file. GITHUB_TOKEN alone can't be used here.
# =============================================================================

name: ⚖️ CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: ⚖️ CLA Assistant
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⚖️ CLA Assistant
        # Only react to PR lifecycle events or the explicit sign / recheck comments.
        if: >-
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/bauer-group/SaaS-AccessibilityWidgetIntegrations/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],renovate[bot],github-actions[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution! Because this project is **dual-licensed** (GNU AGPL-3.0 OR commercial), we first need your agreement to our [Contributor License Agreement](https://github.com/bauer-group/SaaS-AccessibilityWidgetIntegrations/blob/main/CLA.md) before we can merge. Please read it, then post exactly the following comment on this pull request:'
          custom-allsigned-prcomment: '✅ All contributors have signed the CLA — thank you!'
          lock-pullrequest-aftermerge: true
