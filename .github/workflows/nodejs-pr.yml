name: 🔍 PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: 🧪 Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎨 Lint
        run: pnpm lint

      - name: 💅 Format check
        run: pnpm format:check

      - name: 🔎 Typecheck
        run: pnpm typecheck

      - name: 🏗️ Build
        run: pnpm build

      - name: 🧪 Test
        run: pnpm test
