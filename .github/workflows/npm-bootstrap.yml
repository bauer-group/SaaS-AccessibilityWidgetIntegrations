# =============================================================================
# npm Bootstrap (one-time, manual)
# =============================================================================
# OIDC Trusted Publishing (used by release.yml) can only publish a package that
# ALREADY EXISTS on npm. This workflow performs that first listing for all 7 JS
# wrappers using a token, so you don't have to publish each one locally with 2FA.
#
# One-time procedure:
#   1. Create an npm "Automation" access token (bypasses 2FA in CI) for an account
#      that can publish under the @bauer-group scope.
#   2. Add it as the repository secret NPM_TOKEN.
#   3. Run this workflow (Actions → npm Bootstrap → Run workflow).
#   4. On npmjs.com, add a Trusted Publisher to EACH package
#      (repository: this repo, workflow: release.yml).
#   5. Delete the NPM_TOKEN secret — ongoing releases publish tokenless via OIDC.
#
# Publishes the version currently on the checked-out branch (main = the latest
# released version). Re-running is safe: already-published versions are skipped.
# =============================================================================

name: 🔑 npm Bootstrap

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read

jobs:
  bootstrap:
    name: 📤 First-publish all wrappers (token)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🔐 Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: '[ -n "$NPM_TOKEN" ] || { echo "::error::Set the NPM_TOKEN repository secret first (npm Automation token)."; exit 1; }'

      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build all wrappers (dependency order)
        run: pnpm -r build

      - name: 🔖 Resolve version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: 🔗 Pin nextjs workspace dependency to the published version
        run: npm pkg set "dependencies.@bauer-group/accessibility-widget-react=^${{ steps.v.outputs.version }}"
        working-directory: packages/js/nextjs

      - name: 📤 Publish all 7 wrappers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          published=0
          skipped=0
          for d in react vue angular svelte nextjs nuxt astro; do
            echo "::group::publish @bauer-group/accessibility-widget-$d"
            if (cd "packages/js/$d" && npm publish --access public --tag "${{ inputs.dist-tag }}"); then
              published=$((published + 1))
            else
              echo "⚠️ skipped (already published or error) — continuing"
              skipped=$((skipped + 1))
            fi
            echo "::endgroup::"
          done
          echo "## npm bootstrap: ${published} published, ${skipped} skipped (v${{ steps.v.outputs.version }})" >> "$GITHUB_STEP_SUMMARY"
